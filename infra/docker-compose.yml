version: '3.8'

services:
  # ═══════════════════════════════════════════
  # Arena — Go Execution Sandbox
  # ═══════════════════════════════════════════
  arena:
    build:
      context: ..
      dockerfile: infra/arena.Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Orchestrator — Python AI Pipeline
  # ═══════════════════════════════════════════
  orchestrator:
    build:
      context: ..
      dockerfile: infra/orchestrator.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../orchestrator/.env
    environment:
      - ARENA_URL=http://arena:8080
    depends_on:
      - arena
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Frontend — React War Room Dashboard
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - orchestrator
